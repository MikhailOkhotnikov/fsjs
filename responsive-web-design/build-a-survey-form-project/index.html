<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>Форма опроса</title>
</head>
<body>
  <h1 id="title">Форма опроса</h1>

  <p id="description">Описание формы опроса</p>

  <form id="survey-form" action="https://register-demo.freecodecamp.org" method="post" class="survey-form">

    <fieldset>
      <label for="name" id="name-label">Введите имя: <input type="text" id="name" placeholder="Имя" required></label>
      <label for="email" id="email-label">Введие email: <input type="email" name="email" id="email" placeholder="email-адрес" required></label>
      <label for="number" id="number-label">Введите возраст: <input type="number" name="number" placeholder="возраст" id="number" min="6" max="120" required></label>
    </fieldset>

    <fieldset>
      <label for="dropdown">Статус:
        <select name="dropdown" id="dropdown">
          <option value="1">Студент</option>
          <option value="2">Работающий</option>
        </select>
      </label>      
    </fieldset>
    
    <fieldset>
      <legend>Тип учетной записи:</legend>
      <label for="personal-account"><input type="radio" name="radio" id="personal-account" checked class="inline" value="1"> Личный</label>
      <label for="business-account"><input type="radio" name="radio" id="business-account" class="inline" value="2"> Деловой</label>
    </fieldset>

    <fieldset>
      <legend>Откуда вы о нас узнали?</legend>
      <label for="checkbox-one"><input type="checkbox" name="checkbox" id="checkbox-one" class="inline" value="1"> Соцсети</label>
      <label for="checkbox-two"><input type="checkbox" name="checkbox" id="checkbox-two" class="inline" value="2"> Друзья/знакомые</label>
      <label for="checkbox-three"><input type="checkbox" name="checkbox" id="checkbox-three" class="inline" value="3"> Случайно зашел</label>
    </fieldset>

    <label for="about-me">Расскажите о себе:
      <textarea name="about-me" id="about-me" cols="30" rows="10"></textarea>
    </label>

    <input type="submit" id="submit" class="submit" value="Отправить">

  </form>

</body>
</html>
